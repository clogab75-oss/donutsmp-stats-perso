<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DonutSMP Stats — Gabi & Titi</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0d0d0d;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 20px;
  }

  h1 {
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  .subtitle {
    text-align: center;
    font-size: 13px;
    color: #666;
    margin-bottom: 24px;
  }

  .players-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
  }

  .player-card {
    background: #161616;
    border: 1px solid #252525;
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .player-card::before {
    content: '';
    display: block;
    height: 3px;
    background: linear-gradient(90deg, #f97316, #fbbf24);
  }

  .player-card:hover { border-color: #3a3a3a; }

  .card-header {
    background: #1e1e1e;
    padding: 18px 20px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid #232323;
    position: relative;
  }

  .skin-head {
    width: 52px;
    height: 52px;
    border-radius: 6px;
    image-rendering: pixelated;
    border: 2px solid #2e2e2e;
    background: #111;
    flex-shrink: 0;
  }

  .player-name {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    line-height: 1.2;
  }

  .online-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
    margin-top: 4px;
  }

  .online-badge.online  { background: #0f2e1a; color: #4dbb6e; }
  .online-badge.offline { background: #1e1a1a; color: #666; }
  .online-badge.loading { background: #1a1a1a; color: #555; }

  .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .online .dot  { background: #4dbb6e; }
  .offline .dot { background: #444; }
  .loading .dot { background: #444; }

  .rank-badge {
    position: absolute;
    top: 12px;
    right: 14px;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    background: #2a2218;
    color: #c8940a;
    font-weight: 500;
    text-transform: capitalize;
  }

  .card-body { padding: 16px 20px 18px; }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .stat-box {
    background: #111;
    border: 1px solid #1e1e1e;
    border-radius: 8px;
    padding: 10px 12px;
  }

  .stat-label {
    font-size: 11px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .stat-value {
    font-size: 16px;
    font-weight: 600;
    color: #e0e0e0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .stat-value.money    { color: #f0c040; }
  .stat-value.shards   { color: #7ab8f5; }
  .stat-value.kills    { color: #e06060; }
  .stat-value.deaths   { color: #e08060; }
  .stat-value.playtime { color: #85c97a; font-size: 13px; }

  .card-footer {
    border-top: 1px solid #1e1e1e;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: #444;
  }

  .refresh-btn {
    background: none;
    border: 1px solid #2a2a2a;
    border-radius: 5px;
    color: #555;
    cursor: pointer;
    font-size: 11px;
    padding: 3px 9px;
    transition: all 0.15s;
  }

  .refresh-btn:hover { border-color: #4f8ef7; color: #4f8ef7; }

  .error-msg {
    font-size: 12px;
    color: #e05050;
    margin-top: 8px;
    text-align: center;
  }

  .skeleton {
    background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 4px;
    height: 16px;
  }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .bottom-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .last-update {
    font-size: 11px;
    color: #3a3a3a;
    text-align: center;
  }

  .countdown-bar {
    font-size: 11px;
    color: #3a3a3a;
    text-align: center;
  }

  .countdown-bar span {
    color: #4f8ef7;
    font-weight: 500;
  }

  @media (max-width: 500px) {
    body { padding: 12px; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<h1>🍩 DonutSMP Stats</h1>
<p class="subtitle">Tableau de bord de Gabi & Titi</p>

<div class="players-grid">

  <div class="player-card" id="card-Gabi_7892">
    <div class="card-header">
      <img class="skin-head" src="https://mc-heads.net/avatar/Gabi_7892/52" alt="Gabi_7892">
      <div>
        <div class="player-name">Gabi_7892</div>
        <div class="online-badge loading" id="status-Gabi_7892"><span class="dot"></span> Chargement…</div>
      </div>
      <span class="rank-badge" id="rank-Gabi_7892" style="display:none"></span>
    </div>
    <div class="card-body">
      <div class="stats-grid" id="stats-Gabi_7892">
        <div class="stat-box"><div class="stat-label">Argent</div><div class="skeleton"></div></div>
        <div class="stat-box"><div class="stat-label">Shards</div><div class="skeleton"></div></div>
        <div class="stat-box"><div class="stat-label">Kills</div><div class="skeleton"></div></div>
        <div class="stat-box"><div class="stat-label">Morts</div><div class="skeleton"></div></div>
        <div class="stat-box" style="grid-column:span 2"><div class="stat-label">Temps de jeu</div><div class="skeleton"></div></div>
      </div>
      <div class="error-msg" id="error-Gabi_7892" style="display:none"></div>
    </div>
    <div class="card-footer">
      <span id="updated-Gabi_7892">—</span>
      <button class="refresh-btn" onclick="loadPlayer('Gabi_7892')">↻ Rafraîchir</button>
    </div>
  </div>

  <div class="player-card" id="card-Titiavec1maj">
    <div class="card-header">
      <img class="skin-head" src="https://mc-heads.net/avatar/Titiavec1maj/52" alt="Titiavec1maj">
      <div>
        <div class="player-name">Titiavec1maj</div>
        <div class="online-badge loading" id="status-Titiavec1maj"><span class="dot"></span> Chargement…</div>
      </div>
      <span class="rank-badge" id="rank-Titiavec1maj" style="display:none"></span>
    </div>
    <div class="card-body">
      <div class="stats-grid" id="stats-Titiavec1maj">
        <div class="stat-box"><div class="stat-label">Argent</div><div class="skeleton"></div></div>
        <div class="stat-box"><div class="stat-label">Shards</div><div class="skeleton"></div></div>
        <div class="stat-box"><div class="stat-label">Kills</div><div class="skeleton"></div></div>
        <div class="stat-box"><div class="stat-label">Morts</div><div class="skeleton"></div></div>
        <div class="stat-box" style="grid-column:span 2"><div class="stat-label">Temps de jeu</div><div class="skeleton"></div></div>
      </div>
      <div class="error-msg" id="error-Titiavec1maj" style="display:none"></div>
    </div>
    <div class="card-footer">
      <span id="updated-Titiavec1maj">—</span>
      <button class="refresh-btn" onclick="loadPlayer('Titiavec1maj')">↻ Rafraîchir</button>
    </div>
  </div>

</div>

<div class="bottom-bar">
  <p class="last-update" id="last-update-global"></p>
  <p class="countdown-bar">🔄 <span id="countdown">60s</span></p>
</div>

<script>
const PLAYERS = ['Gabi_7892', 'Titiavec1maj'];
const API_KEY = '62b43df23cc74afd827f43a2f6db3273';
const PROXY   = 'https://corsproxy.io/?url=';
const BASE    = 'https://api.donutsmp.net';
const REFRESH = 10;

let countdown = REFRESH;
let timer = null;

function startCountdown() {
  clearInterval(timer);
  countdown = REFRESH;
  updateCountdown();
  timer = setInterval(() => {
    countdown--;
    updateCountdown();
    if (countdown <= 0) loadAll();
  }, 1000);
}

function updateCountdown() {
  const el = document.getElementById('countdown');
  if (el) el.textContent = countdown + 's';
}

function fmtMoney(v) {
  const n = parseFloat(v);
  if (isNaN(n)) return '—';
  if (n >= 1e9) return '$' + (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(1) + 'K';
  return '$' + Math.round(n).toLocaleString('fr-FR');
}

function fmtShards(v) {
  const n = parseFloat(v);
  if (isNaN(n)) return '—';
  if (n >= 1e6) return (n/1e6).toFixed(2) + 'M ✦';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K ✦';
  return Math.round(n).toLocaleString('fr-FR') + ' ✦';
}

function fmtNum(v) {
  const n = parseInt(v);
  if (isNaN(n)) return '—';
  return n.toLocaleString('fr-FR');
}

function fmtPlaytime(ms) {
  const n = parseInt(ms);
  if (isNaN(n)) return '—';
  const totalMin = Math.floor(n / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  if (h >= 24) {
    const d = Math.floor(h / 24);
    return d + 'j ' + (h % 24) + 'h ' + m + 'min';
  }
  return h + 'h ' + m + 'min';
}

function fmtTime() {
  return new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

function renderStats(username, stats, online) {
  const grid     = document.getElementById('stats-' + username);
  const err      = document.getElementById('error-' + username);
  const statusEl = document.getElementById('status-' + username);
  const rankEl   = document.getElementById('rank-' + username);
  const updEl    = document.getElementById('updated-' + username);

  err.style.display = 'none';

  if (online === true) {
    statusEl.className = 'online-badge online';
    statusEl.innerHTML = '<span class="dot"></span> En ligne 🟢';
  } else if (online === false) {
    statusEl.className = 'online-badge offline';
    statusEl.innerHTML = '<span class="dot"></span> Hors ligne';
  }

  if (stats.rank && stats.rank !== 'default') {
    rankEl.textContent = stats.rank;
    rankEl.style.display = '';
  }

  grid.innerHTML = `
    <div class="stat-box">
      <div class="stat-label">💰 Argent</div>
      <div class="stat-value money">${fmtMoney(stats.money)}</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">💎 Shards</div>
      <div class="stat-value shards">${fmtShards(stats.shards)}</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">⚔️ Kills</div>
      <div class="stat-value kills">${fmtNum(stats.kills)}</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">💀 Morts</div>
      <div class="stat-value deaths">${fmtNum(stats.deaths)}</div>
    </div>
    <div class="stat-box" style="grid-column:span 2">
      <div class="stat-label">⏱️ Temps de jeu</div>
      <div class="stat-value playtime">${fmtPlaytime(stats.playtime)}</div>
    </div>
  `;

  updEl.textContent = 'Mis à jour à ' + fmtTime();
}

function showError(username, msg) {
  const grid     = document.getElementById('stats-' + username);
  const err      = document.getElementById('error-' + username);
  const statusEl = document.getElementById('status-' + username);

  statusEl.className = 'online-badge offline';
  statusEl.innerHTML = '<span class="dot"></span> Erreur';

  grid.innerHTML = `
    <div class="stat-box"><div class="stat-label">💰 Argent</div><div class="stat-value">—</div></div>
    <div class="stat-box"><div class="stat-label">💎 Shards</div><div class="stat-value">—</div></div>
    <div class="stat-box"><div class="stat-label">⚔️ Kills</div><div class="stat-value">—</div></div>
    <div class="stat-box"><div class="stat-label">💀 Morts</div><div class="stat-value">—</div></div>
    <div class="stat-box" style="grid-column:span 2"><div class="stat-label">⏱️ Temps de jeu</div><div class="stat-value">—</div></div>
  `;

  err.style.display = 'block';
  err.textContent = msg;
}

async function apiFetch(path) {
  const url = PROXY + encodeURIComponent(BASE + path);
  const r = await fetch(url, {
    headers: { 'Authorization': 'Bearer ' + API_KEY }
  });
  return r;
}

async function loadPlayer(username) {
  let stats = {};
  let online = null;

  try {
    const r = await apiFetch('/v1/player/stats/' + username);
    if (r.status === 401) { showError(username, '❌ Clé API invalide ou expirée.'); return; }
    if (!r.ok) { showError(username, '❌ Joueur introuvable : ' + username); return; }
    const data = await r.json();
    stats = data.data || data;
  } catch(e) {
    showError(username, '❌ Erreur réseau. Réessai dans ' + countdown + 's…');
    return;
  }

  try {
    const r2 = await apiFetch('/v1/player/online/' + username);
    if (r2.ok) {
      const d2 = await r2.json();
      online = d2.online === true || d2.data?.online === true;
    } else {
      online = false;
    }
  } catch(e) { online = false; }

  renderStats(username, stats, online);
}

function loadAll() {
  PLAYERS.forEach(p => loadPlayer(p));
  const el = document.getElementById('last-update-global');
  if (el) el.textContent = 'Dernière actualisation : ' + new Date().toLocaleString('fr-FR');
  startCountdown();
}

window.addEventListener('load', () => loadAll());
</script>
</body>
</html>
